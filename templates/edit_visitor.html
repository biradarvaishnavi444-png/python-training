 {% extends "base.html" %}
{% block title %}Edit Visitor — {{visitor.visitor_name}}{% endblock %}

{% block content %}

<div class="row-justify-content center">
<div class="col-md-5 mx-auto">

<div class="card shadow-lg border-0 rounded-4 ">
    <div class="card-header py-3" style="background-color: #14b8a6;">
        <h5 class="mb-0 text-white">
            ✏️ Edit Visitor Details
        </h5>
    </div>

    <div class="card-body p-4">
        <!--Current values info -->
        <div class="alert alert-info" py-2 mb-4 role="alert">
            <small>
                <strong>Editing: </strong>
                {{ visitor.visitor_name }}
                Room No: {{visitor.room_no}}-
                Purpose: {{ visitor.purpose }}
            </small>
        </div>

        <form action="/edit_visitor/{{ visitor.id }}"
              method="POST">

              <div class="mb-3">
                <label class="form-label fw-bold">Visitor Name</label>
              
              <input required
                     name="visitor_name"
                     class="form-control"
                     placeholder="Enter Visitor Name"
                     type="text"
                     value="{{ visitor.visitor_name }}">
              </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Student Name</label>
                <input required
                       name="student_name"
                       class="form-control"
                       placeholder="Enter Student Name"
                       type="text"
                       value="{{ visitor.student_name }}">
                </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Room No</label>
                <input required
                       name="room_no"
                       class="form-control"
                       placeholder="Enter Room No "
                       type="number"
                       value="{{ visitor.room_no }}">
                </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Purpose of Visit </label>
                <input required
                          name="purpose" 
                          class="form-control"
                          type="text"value="{{ visitor.purpose }}">
                </div>

            <div class="d-grid">
                <button type="submit" class="btn btn-warning fw-bold">
                    Save Changes
                </button>
                <a href="/records"
                   class="btn btn-outline-secondary mt-2">
                    Cancel
                </a>
            </div>

        </form>

    </div>

</div>
</div>

{% endblock %}
