<!DOCTYPE html>
<html>
<head>
<title>Hostel Management System </title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
.navbar {
    background: linear-gradient(90deg, #0dfd61, #10aef2);
    box-shadow: 0 4px 10px rgba(0,0,0,0.2)
}
.navbar-brand,
.nav-link{
    color:white !important;
}
.nav-link:hover{
    color:yellow !important;
}

footer {
    background:#0d6efd;
    color:white;
    text-align:center;
    padding: 20px;
}
</style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
        <a class="navbar-brand" href="/">🏠 Hostel Visitor Log System </a>

        <div>
            <div class="ms-auto d-flex align-items-center" style="display:flex;gap:40px;">
                
                <a class="nav-link " href="/">🏠 Home </a>
                <a class="nav-link " href="/records">📋 Records </a>
                <a class="nav-link " href="/about">  ℹ️ About </a>
                <a class="nav-link " href="/add ">
                    ➕ Add Visitor
                </a>

                <a class="nav-link " href="/filter">
                    🔍 Filter
                </a>
                <form class="d-flex ms-3 ms-3" action="/search" method="GET">
                    <input class="form-control form-control-sm me-2" style="width:130px; height:35px" type="search" placeholder="Search" name="q">
                    <button class="btn btn-outline-light btn-sm" style="width:100px; height:35px" type="submit">Search</button>
                </form>
            </div>
        </div>
    </div>
</nav>

<div class="container mt-4">

    {% with messages = get_flashed_messages() %}
    {% if messages %}
    {% for message in messages %}
    <div class="alert alert-success">
        {{message}}
    </div>
    {% endfor %}
    {% endif %}
    {% endwith %}

    {% block content %}
    {% endblock %}
</div>

<footer class="bg-primary text-white text-center p-3 mt-4">
    Hostel Visitor Log System @ 2026
</footer>


</body>
</html>
